name: Proxy Auto-Updater

on:
  schedule:
    - cron: '*/20 * * * *' # اجرا هر ۳۰ دقیقه
  workflow_dispatch: # دکمه اجرای دستی تو گیت‌هاب

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add proxies.json
          # اگه تغییری بود کامیت کن، وگرنه رد شو
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update proxies [skip ci]" && git push)
