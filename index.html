<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☬SHΞN PROXY HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600;700&display=swap');

        body {
            background-color: #0a0e14;
            background-image: radial-gradient(ellipse at top, #16202d 0%, #0a0e14 80%);
            background-attachment: fixed;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        #top-loader {
            position: fixed; top: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, #00ffff, #0088ff);
            z-index: 9999; width: 0%; transition: all 1.2s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(18, 24, 32, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .title-font { font-family: 'Orbitron', sans-serif; }
        .title-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .type-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            transition: all 0.25s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .type-btn:hover, .type-btn.active {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            color: white;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .country-wrapper { cursor: pointer; }
        .country-circle {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .country-wrapper:hover .country-circle {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .country-wrapper.active .country-circle {
            background: rgba(0, 255, 255, 0.12);
            border-color: #00ffff;
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.35);
        }
        .country-wrapper.active .country-label {
            color: #00ffff;
            text-shadow: 0 0 6px rgba(0, 255, 255, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-3 md:p-6 relative">

    <div id="top-loader"></div>

    <header class="w-full max-w-6xl text-center mb-8 mt-4">
        <h1 class="title-font text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black title-gradient tracking-[0.15em]">
            ☬SHΞN™ PROXY HUB
        </h1>
        <p class="text-gray-400 text-xs sm:text-sm tracking-[0.2em] uppercase font-bold mt-3">
            Premium Fresh Proxy For Psiphon
        </p>
    </header>

    <main class="w-full max-w-6xl flex-grow flex flex-col gap-6">
        
        <div class="glass-panel p-6 flex flex-col gap-6 w-full">
            
            <!-- Type Filters - طراحی جدید و قرینه -->
            <div class="flex flex-wrap justify-center gap-2 sm:gap-3" id="type-filters">
                <button class="type-btn active px-5 py-2.5 rounded-xl text-sm font-semibold" data-type="ALL">ALL TYPES</button>
                <button class="type-btn px-5 py-2.5 rounded-xl text-sm font-semibold" data-type="HTTP">HTTP</button>
                <button class="type-btn px-5 py-2.5 rounded-xl text-sm font-semibold" data-type="HTTPS">HTTPS</button>
                <button class="type-btn px-5 py-2.5 rounded-xl text-sm font-semibold" data-type="SOCKS5">SOCKS5</button>
            </div>

            <div class="h-px w-full bg-white/5"></div>

            <!-- Country Filters -->
            <div class="flex flex-wrap justify-center gap-4 sm:gap-6 md:gap-8" id="country-filters">
                <div class="flex flex-col items-center gap-2 country-wrapper active" data-country="ALL">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🌐</div>
                    <span class="text-xs font-bold tracking-widest country-label">ALL</span>
                </div>

                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="US"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇺🇸</div><span class="text-xs font-bold tracking-widest country-label">US</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="FI"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇫🇮</div><span class="text-xs font-bold tracking-widest country-label">FI</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="DE"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇩🇪</div><span class="text-xs font-bold tracking-widest country-label">DE</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="NL"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇳🇱</div><span class="text-xs font-bold tracking-widest country-label">NL</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="IT"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇮🇹</div><span class="text-xs font-bold tracking-widest country-label">IT</span></div>

                <!-- کشورهای جدید -->
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="IR"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇮🇷</div><span class="text-xs font-bold tracking-widest country-label">IR</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="AR"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇦🇷</div><span class="text-xs font-bold tracking-widest country-label">AR</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="RU"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇷🇺</div><span class="text-xs font-bold tracking-widest country-label">RU</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="SE"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇸🇪</div><span class="text-xs font-bold tracking-widest country-label">SE</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="AE"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇦🇪</div><span class="text-xs font-bold tracking-widest country-label">AE</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="CH"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇨🇭</div><span class="text-xs font-bold tracking-widest country-label">CH</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="TR"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇹🇷</div><span class="text-xs font-bold tracking-widest country-label">TR</span></div>
            </div>
        </div>

        <!-- بقیه فایل بدون تغییر (جدول، موبایل، اسکریپت) -->
        <div class="flex justify-between items-center px-2 text-xs font-semibold tracking-wider text-gray-500 uppercase">
            <div class="flex items-center gap-2">
                <span class="relative flex h-2.5 w-2.5">
                  <span id="ping-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span id="ping-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                <span id="status-text">System Online</span>
            </div>
            <div class="bg-white/5 px-3 py-1 rounded border border-white/10 text-cyan-400">
                <span id="count-text">0</span> Proxies
            </div>
        </div>

        <div class="glass-panel w-full overflow-hidden hidden md:block">
            <table class="w-full text-sm text-left border-collapse">
                <thead class="text-xs text-gray-400 uppercase bg-white/5 border-b border-white/10 tracking-wider">
                    <tr>
                        <th class="px-6 py-5 font-bold">IP : Port</th>
                        <th class="px-6 py-5 font-bold">Location</th>
                        <th class="px-6 py-5 font-bold">Type</th>
                        <th class="px-6 py-5 font-bold">Anonymity</th>
                        <th class="px-6 py-5 text-center font-bold">Uptime</th>
                        <th class="px-6 py-5 text-right font-bold">Last Checked</th>
                    </tr>
                </thead>
                <tbody id="desktop-list" class="divide-y divide-white/5"></tbody>
            </table>
        </div>

        <div id="mobile-list" class="grid grid-cols-1 gap-4 md:hidden"></div>
    </main>

    <footer class="w-full max-w-6xl mt-12 mb-6 py-6 border-t border-white/10 text-center">
        <a href="https://t.me/aishervin" target="_blank" class="inline-block hover:scale-105 transition-transform">
            <span class="text-gray-500 text-xs sm:text-sm tracking-[0.2em] font-medium">
                Exclusive <span class="text-gray-200 font-bold title-font text-lg">☬SHΞN™</span> made
            </span>
        </a>
    </footer>

    <!-- Toast و بقیه اسکریپت‌ها بدون تغییر -->
    <div id="custom-toast" class="fixed hidden bottom-8 left-1/2 -translate-x-1/2 bg-cyan-500/10 border border-cyan-400 text-white px-6 py-3 rounded-xl text-sm font-semibold backdrop-blur-md"></div>

    <script>
        // (تمام اسکریپت قبلی بدون تغییر - فقط کپی از فایل قبلی)
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('top-loader');
            loader.style.width = '100%';
            setTimeout(() => loader.style.opacity = '0', 1200);
        });

        let proxiesData = [];
        let currentType = "ALL";
        let currentCountry = "ALL";

        function getFlagEmoji(countryCode) {
            if (!countryCode || countryCode === "ALL") return "🌐";
            const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
            return String.fromCodePoint(...codePoints);
        }

        function formatTimeAgo(unix_ts) {
            const seconds = Math.floor(Date.now() / 1000) - unix_ts;
            if (seconds < 60) return `Just now`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            return `${Math.floor(seconds / 3600)}h ago`;
        }

        function getQualityColor(uptime) {
            if (uptime >= 70) return 'text-green-400';
            if (uptime >= 30) return 'text-yellow-400';
            return 'text-red-400';
        }

        function getAnonBadge(anon) {
            let base = "px-2 py-0.5 rounded text-xs font-bold tracking-wider uppercase";
            if (anon === 'ELITE') return `${base} text-purple-300 bg-purple-500/20 border border-purple-500/30`;
            if (anon === 'ANON' || anon === 'ANONYMOUS') return `${base} text-blue-300 bg-blue-500/20 border border-blue-500/30`;
            return `${base} text-gray-300 bg-gray-500/20 border border-gray-500/30`;
        }

        function renderProxies() {
            // ... (بقیه تابع renderProxies همان قبلی است)
            const desktopBody = document.getElementById('desktop-list');
            const mobileBody = document.getElementById('mobile-list');
            desktopBody.innerHTML = '';
            mobileBody.innerHTML = '';

            const filteredData = proxiesData.filter(p => {
                const matchType = currentType === "ALL" || p.type.toUpperCase() === currentType;
                const matchCountry = currentCountry === "ALL" || p.cc.toUpperCase() === currentCountry;
                return matchType && matchCountry;
            });

            document.getElementById('count-text').innerText = filteredData.length;

            if (filteredData.length === 0) {
                const msg = `<div class="p-8 text-center text-gray-500">No proxies found.</div>`;
                desktopBody.innerHTML = `<tr><td colspan="6">${msg}</td></tr>`;
                mobileBody.innerHTML = msg;
                return;
            }

            filteredData.forEach(p => {
                const ipPort = `\( {p.ip}: \){p.port}`;
                const flag = getFlagEmoji(p.cc);
                const timeAgo = formatTimeAgo(p.checked_ts);
                const qualityColor = getQualityColor(p.uptime);

                // Desktop Row (کوتاه شده برای جلوگیری از طولانی شدن پیام)
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4"><span class="proxy-value title-font text-lg \( {qualityColor}" onclick="copyProxy(' \){ipPort}')">${ipPort}</span></td>
                    <td class="px-6 py-4"><span class="text-xl mr-2">\( {flag}</span> \){p.cc}</td>
                    <td class="px-6 py-4">${p.type}</td>
                    <td class="px-6 py-4"><span class="\( {getAnonBadge(p.anonymity)}"> \){p.anonymity}</span></td>
                    <td class="px-6 py-4 text-center font-bold \( {qualityColor}"> \){p.uptime}%</td>
                    <td class="px-6 py-4 text-right text-gray-500">🕒 ${timeAgo}</td>
                `;
                desktopBody.appendChild(tr);

                // Mobile Card (مشابه قبلی)
                const card = document.createElement('div');
                card.className = "glass-panel p-4 rounded-2xl";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <span class="proxy-value title-font text-xl \( {qualityColor}" onclick="copyProxy(' \){ipPort}')">${ipPort}</span>
                        <span class="text-3xl">${flag}</span>
                    </div>
                    <div class="flex justify-between text-sm mt-3">
                        <span>${p.type} • ${p.cc}</span>
                        <span class="\( {getAnonBadge(p.anonymity)}"> \){p.anonymity}</span>
                    </div>
                    <div class="flex justify-between text-xs mt-2">
                        <span class="text-gray-500">🕒 ${timeAgo}</span>
                        <span class="font-bold ${qualityColor}">Uptime: ${p.uptime}%</span>
                    </div>
                `;
                mobileBody.appendChild(card);
            });
        }

        // Event Listeners
        document.querySelectorAll('#type-filters .type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#type-filters .type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.getAttribute('data-type');
                renderProxies();
            });
        });

        document.querySelectorAll('#country-filters .country-wrapper').forEach(wrapper => {
            wrapper.addEventListener('click', () => {
                document.querySelectorAll('#country-filters .country-wrapper').forEach(w => w.classList.remove('active'));
                wrapper.classList.add('active');
                currentCountry = wrapper.getAttribute('data-country');
                renderProxies();
            });
        });

        async function loadProxies() {
            try {
                const res = await fetch('proxies.json?t=' + Date.now());
                proxiesData = await res.json();
            } catch (e) {
                console.log("Using fallback data");
                proxiesData = [];
            }
            renderProxies();
        }

        function copyProxy(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('custom-toast');
                toast.textContent = `Copied: ${text}`;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 1800);
            });
        }

        loadProxies();
    </script>
</body>
</html>
